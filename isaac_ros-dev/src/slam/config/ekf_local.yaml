ekf_local:
  ros__parameters:
    # Local EKF (e.g., ekf_local.yaml)
    frequency: 30.0              # High update rate for control
    world_frame: odom          # Output odom->base_link
    two_d_mode: false

    # Whether to publish the acceleration state. Defaults to false if unspecified.
    publish_acceleration: true

# Whether to broadcast the transformation over the /tf topic. Defaults to true if unspecified.
    publish_tf: true


    # Topic names match the actual publishers on Bowser. The
    # original ``imu1/data`` / ``imu2/data`` / ``wheel_encoder/odom``
    # placeholders left over from initial wiring are not published
    # by anything in this repo, so the EKF was silently starved
    # of inputs and never produced a ``/local_ekf/odom`` heartbeat —
    # which in turn left ``gps_handler_node``'s predict step idle
    # and the magnetometer-less θ EKF stuck at 0. See the
    # autonav-gui-hud EKF participation pulse for live verification.
    imu0: /zed/zed_node/imu/data    # ZED camera onboard IMU
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, true, true,
                  false, false, false] # TODO tune based on what sensor reads
    imu0_differential: true

    imu1: /sick_scansegment_xd/imu  # SICK lidar onboard IMU (redundancy)
    imu1_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, true, true,
                  false, false, false] #TODO tune based on what sensor reads
    imu1_differential: true

    odom0: /odom                     # wheel_odom_pub.cpp publishes here
    odom0_config: [false, false, false,
                  false, false, false,
                  true, true, false,
                  false, false, true,
                  false, false, false] #TODO tune based on what sensor reads
    odom0_differential: true





