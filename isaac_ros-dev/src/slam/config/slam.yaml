slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    # PCA-filtered 2-D laser scan (autonav_detection::grade_detector →
    # pointcloud_to_laserscan in slam.launch.py). Using the filtered
    # scan instead of raw /scan_fullframe means SLAM maps only what
    # PCA classifies as obstacles (no ramp faces / drivable grades as
    # walls) — those obstacles end up in /map → /map_padded → global
    # costmap static_layer as persistent long-range obstacles, so the
    # obstacle_layer can stay short-range (2.5 m) for dynamics only.
    # SLAM consumes the raw layer-5 scan again.
    #
    # History: flipped to /scan_pca_filtered when /scan_fullframe was
    # producing big map→odom snaps that scaled with distance. Root
    # cause turned out to be ekf_local over-fusing wheel velocity and
    # SICK IMU yaw rate (both reporting near-degenerate covariance) —
    # the over-confident odom→base_link drift forced slam_toolbox to
    # snap map→odom to compensate.
    #
    # That EKF fusion has now been calibrated (ekf_local: pose-only
    # /odom, IMU disabled). With odom→base_link clean (sub-mm jitter
    # at rest verified by tf2_echo), slam_toolbox no longer has to
    # fight a drifting odom — so /scan_fullframe's dense returns
    # become genuinely useful constraint instead of unstable points
    # the matcher had to wrestle.
    #
    # /scan_pca_filtered also has a separate independent problem:
    # in this environment only ~11% of beams come back finite (78/723),
    # leaving the correlative scan-matcher starved of geometry — it
    # silently accepts weak matches and the "map catches up with
    # robot" symptom appears. /scan_fullframe doesn't have this
    # density issue.
    #
    # Independent of scan topic: PCA thresholds are NOT to be relaxed.
    # /scan_pca_filtered remains the right input for the Nav2 obstacle
    # layer (via pca_pc2_to_scan) — that path is unchanged.
    scan_topic: /scan_fullframe
    use_map_saver: true
    mode: mapping

    debug_logging: false

    # Throttle: only process 1 out of every N scans.
    # The SICK at full rate overwhelms slam_toolbox on the Jetson.
    # Set to 2 or 3 if the lidar publishes at 20 Hz (keeps effective
    # SLAM input at 7-10 Hz which is well within budget).
    throttle_scans: 2

    # How often to broadcast the map->odom TF (seconds).
    # 0.02 = 50 Hz. Fine for real robot; set 0.0 to never publish
    # (use if something else broadcasts this transform).
    transform_publish_period: 0.02

    map_update_interval: 5.0
    # 0.10 m matches what map_padder and global_costmap consume, so /map
    # is published at the target downstream resolution and map_padder's
    # downsample step (factor = round(out_res / slam_res)) becomes 1:1.
    # Local costmap stays at 0.05 m — it's fed by laser scans directly,
    # not by /map, so DWB's narrow-gap precision is unaffected.
    resolution: 0.10
    min_laser_range: 0.3
    max_laser_range: 10.0
    minimum_time_interval: 0.3   # seconds between accepted scans (rate limiter)
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: false  # off: saves CPU on Jetson

    # General Parameters
    # Off: with static map=odom TF, slam-correction snaps cause oscillations.
    use_scan_matching: false
    use_scan_barycenter: true
    # Only insert a keyframe after the robot has actually moved. 0.0 grew the pose graph at scan rate and slowed slam at distance.
    minimum_travel_distance: 0.5
    minimum_travel_heading: 0.3
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    # Bumped from 0.1 → 0.3. With sparse/ambiguous outdoor scans the
    # correlative matcher can return a "match" at low response score
    # that doesn't actually correspond to real overlap — and silently
    # accepting such matches lets slam_toolbox conclude "robot didn't
    # move much" when it did, snapping map→odom forward and producing
    # the "map catching up with the robot" symptom. 0.3 makes the
    # matcher reject low-confidence matches; if no match passes, the
    # scan is dropped rather than fused incorrectly.
    link_match_minimum_response_fine: 0.3
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation Parameters
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop Closure Parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true