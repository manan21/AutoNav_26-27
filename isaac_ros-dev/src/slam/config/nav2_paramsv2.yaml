bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    # nav_center = body geometric center (shogi.urdf: fixed child of
    # base_link at +0.225 m forward). Driving every NAV2 frame off
    # nav_center spawns /plan at the body center and pins the controller's
    # tracked point to the body center — killing the corner-cut feedback
    # where the path used to originate at the drive axle (base_link)
    # 22.5 cm behind the body.
    robot_base_frame: nav_center
    # Use the EKF-fused odom (wheel + SICK IMU) so behavior-tree
    # conditions (IsStuck, GoalUpdated staleness checks, etc.) reason
    # about smoothed velocity/pose, not raw wheel encoder readings.
    odom_topic: /local_ekf/odom
    bt_loop_duration: 10
    default_server_timeout: 60
    wait_for_service_timeout: 1000
    default_nav_to_pose_bt_xml: "/autonav/isaac_ros-dev/install/slam/share/slam/behavior_trees/bt_nav.xml"
    default_nav_through_poses_bt_xml: "/autonav/isaac_ros-dev/install/slam/share/slam/behavior_trees/bt_nav.xml"

    # PHASEB — PathSignificantlyChanged decorator tuning. Tweak live with:
    #   ros2 param set /bt_navigator path_significantly_changed.rms_threshold_m 0.15
    path_significantly_changed.rms_threshold_m: 0.10   # First-N-pose RMS (m) above which child re-fires.
    path_significantly_changed.compare_n_poses: 10     # Number of leading poses to RMS-compare.

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node
      - autonav_goal_bender_bt_node
      - autonav_path_significantly_changed_bt_node   # PHASEB

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 2.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      # PHASEA A.2: 8.0 → 15.0 — covers transient inflation traversals
      # so the controller does not declare itself stuck mid-line-cross
      # and bounce into FollowPathRecovery on a 7 s cycle.
      movement_time_allowance: 15.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 6.28319
    # Regulated Pure Pursuit (RPP) — replaces DWB.
    #
    # Why the swap: DWB samples (vx, vω) trajectories and forward-simulates
    # them with a unicycle model that assumes the tracked point moves at
    # vx along its heading with vy=0 in body frame. On shogi this is
    # wrong: robot_base_frame is nav_center, which sits 22.5 cm forward
    # of the drive-wheel axle (base_link). During any rotation, the real
    # nav_center sweeps an arc of radius 0.225 m around base_link — i.e.
    # in body frame the velocity is vy = ω × 0.225, exactly the term DWB
    # drops. PathDist scores DWB's predicted nav_center poses, but the
    # executed command produces a different nav_center trajectory. No
    # critic tuning fixes this — it's structural.
    #
    # RPP doesn't forward-simulate. Every tick it: (1) reads the actual
    # robot_base_frame pose from TF (lever-arm baked in by URDF), (2)
    # picks a lookahead point on /plan at distance lookahead_dist ahead
    # of that pose, (3) computes the arc that hits the lookahead point,
    # (4) emits (vx, vω). The control law is "drive nav_center toward
    # the path" — exactly the requirement.
    #
    # No heading-to-tangent enforcement. The body yaw is left to evolve
    # naturally; the geometric center is what tracks. Per operator:
    # "the path is already designed to avoid obstacles, the robot just
    # needs to follow it." use_cost_regulated_linear_velocity_scaling
    # is off because the planner's already routed around cost gradients.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # Velocity envelope (matches old DWB limits).
      desired_linear_vel: 1.5
      min_approach_linear_velocity: 0.10
      approach_velocity_scaling_dist: 0.6
      max_robot_pose_search_dist: 10.0
      # ── Lookahead tuned for DWB-like smoothness ───────────────────
      # A fixed-short lookahead (0.4 m at 1.5 m/s = 0.27 s of preview)
      # made RPP yaw-oscillate: every centimeter of path jitter became
      # a steering correction. DWB looked smooth because its sim_time
      # of 1.2 s evaluated each candidate trajectory ~1.2 s ahead and
      # discarded the high-curvature ones. To recreate that here we
      # velocity-scale the lookahead so the carrot sits ~1.0 s of
      # travel ahead — wide at speed, tightening at low velocity.
      # Floor (min) prevents tight wobble when the robot slows for
      # curves; ceiling (max) prevents the carrot from running off
      # past the goal on long straight segments.
      use_velocity_scaled_lookahead_dist: true
      lookahead_time: 1.0
      lookahead_dist: 1.0           # fallback if velocity_scaled is disabled
      min_lookahead_dist: 0.5
      max_lookahead_dist: 2.0
      transform_tolerance: 0.2
      # Heading is NOT controlled by this controller. nav_center
      # position-on-path is the sole tracking objective; body yaw is
      # whatever the diff-drive kinematics make it. Rotate-to-heading
      # behaviors are explicitly disabled.
      use_rotate_to_heading: false
      rotate_to_heading_min_angle: 3.15
      rotate_to_heading_angular_vel: 0.0
      # Matches DWB's acc_lim_theta: 0.9. RPP only consults this when
      # rotate_to_heading is active (off here), but set it consistent
      # so any future enable doesn't import a hidden 3.2 rad/s² jerk.
      max_angular_accel: 0.9
      # Forward-only (per competition constraint).
      allow_reversing: false
      # Curvature regulation: slow down on tight bends so the body
      # tracks the planned arc instead of overshooting. Min radius
      # widened from 0.6 → 1.2 m so the robot eases off velocity well
      # before it has to swing hard — straight contributor to the
      # DWB-style smoothness.
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 1.2
      regulated_linear_scaling_min_speed: 0.25
      # Path is already collision-free by construction — don't slow
      # for general cost gradients near the path.
      use_cost_regulated_linear_velocity_scaling: false
      # Collision check along the chosen arc as a safety net only.
      # Stops the robot if a lethal cell sits within ~1 s of arc travel.
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      # Walk the path in order (don't snap to the closest point on
      # multi-pass / loopback paths). Tighter pose-search than the
      # default keeps the controller from jumping ahead on bends.
      use_interpolation: false

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 15.0
      publish_frequency: 15.0
      global_frame: odom
      robot_base_frame: nav_center
      use_sim_time: False
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # Footprint expressed in nav_center frame (was base_link with
      # +0.77/-0.32 x-extent; -0.225 shift makes it symmetric).
      footprint: "[ [0.545, 0.41], [0.545, -0.41], [-0.545, -0.41], [-0.545, 0.41] ]"
      footprint_padding: 0.0
      plugins: ["obstacle_layer", "inflation_layer", "line_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        # Source = PCA-filtered 2-D LaserScan (autonav_detection::
        # grade_detector → pointcloud_to_laserscan in slam.launch.py).
        # The 3-D /scan_pca_filtered_points is collapsed once, upstream,
        # into /scan_pca_filtered so SLAM and this layer see the same
        # 2-D representation. Every return in this scan is an obstacle
        # (ground / ramp already filtered by PCA grade classification).
        # Two observation sources to split marking and clearing FOVs:
        #   mark_scan  → /scan_pca_filtered       (180°, marking only)
        #   clear_scan → /scan_pca_filtered_clear (160°, clearing only)
        # The outer 10° wedge on each side marks obstacles but doesn't
        # raytrace-clear them — the lidar's beam density / accuracy
        # falls off at the FOV edges, so we don't let those edge rays
        # claim "this cell is free." Stored marks in that wedge persist
        # until the local rolling window drops them.
        observation_sources: mark_scan clear_scan

        mark_scan:
          topic: /scan_pca_filtered
          observation_persistence: 0.0
          marking: True
          clearing: False
          data_type: "LaserScan"
          inf_is_valid: false
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          # raytrace ranges unused (clearing: False), but set for safety
          raytrace_max_range: 0.0
          raytrace_min_range: 0.0

        clear_scan:
          topic: /scan_pca_filtered_clear
          observation_persistence: 0.0
          marking: False
          clearing: True
          data_type: "LaserScan"
          inf_is_valid: false
          # raytrace-clear free space all the way out to the lidar's
          # full reach. Marking ranges unused (marking: False).
          raytrace_max_range: 25.0
          raytrace_min_range: 0.0
          obstacle_max_range: 0.0
          obstacle_min_range: 0.0

      line_layer:
        plugin: "line_layer::LineLayer"
        enabled: True
        line_topic: "/line_points"
        transform_tolerance: 0.2
        max_message_age_ms: 750
        # With view-gated clearing, this is the time a stale line must be
        # in the camera clearing cone before it is forgotten. Keep this
        # cone conservative: do not clear the near ground blind spot right
        # in front of the robot, where the camera can no longer see a line.
        observation_persistence_ms: 8000
        observation_persistence_resolution_m: 0.10
        clear_lines_only_in_view: true
        line_clear_angle_min_rad: -0.40
        line_clear_angle_max_rad: 0.40
        line_clear_range_min_m: 1.20
        line_clear_range_max_m: 4.50
        max_persisted_points: 12000
        clearing: True
        rolling_window: True
        publish_costmap: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 5.0 → 3.0 (post-cone-strike tune): widens the effective
        # stay-away radius from ~0.55 m to ~0.75 m around any obstacle
        # without consuming the full 1.10 m inflation_radius, so tight
        # IGVC gates still plan. Both local_costmap and global_costmap
        # share the same value by intent (see global_costmap comment).
        cost_scaling_factor: 3.0
        inflation_radius: 1.40

      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 3.0
      publish_frequency: 2.0
      global_frame: map
      # nav_center: planner's start pose for every replan is looked up as
      # map → nav_center, so /plan spawns at the body geometric center
      # instead of the drive axle (was base_link). Eliminates the inward
      # corner-cut from continuous replanning around the axle offset.
      robot_base_frame: nav_center
      use_sim_time: False
      # Footprint expressed in nav_center frame (symmetric ±0.545 x,
      # ±0.41 y) — see local_costmap footprint note.
      footprint: "[ [0.545, 0.41], [0.545, -0.41], [-0.545, -0.41], [-0.545, 0.41] ]"
      footprint_padding: 0.0
      resolution: 0.10
      # static_layer drives the global costmap geometry from /map_padded, which is a dynamic bounding box covering robot footprint + goal + plan. The width/height/origin below are only the pre-first-/map_padded fallback.
      width: 6
      height: 6
      origin_x: -3.0
      origin_y: -3.0
      track_unknown_space: true
      # No detector topic is consumed directly by the global costmap.
      # The contributors are:
      #   static_layer            → /map_padded → geometry only (all cells UNKNOWN; no SLAM data, no LETHAL corridor walls). map_padder still grows/shrinks the bounding box toward goals.
      #   local_mirror_layer      → /local_costmap/costmap → persistent obstacle memory. FREE cells may clear stored obstacles only inside the current forward lidar-clearing sector.
      #   line_memory_mirror_layer → /line_costmap → persistent line-only memory promoted from the local line layer. Whatever survived in the local line costmap keeps living in global after it rolls out of local view.
      # Inflation matches the local (1.10 m) so the planner respects the same clearance the controller's local view uses.
      # line_memory_mirror_layer is intentionally placed AFTER
      # inflation_layer so the already-inflated local line costs from
      # /line_costmap are copied into global without being inflated a
      # second time.
      plugins: ["static_layer", "local_mirror_layer", "inflation_layer", "line_memory_mirror_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        map_topic: "/map_padded"
        first_map_only: false
        # Treat UNKNOWN cells in /map_padded as FREE_SPACE for the planner — Dijkstra can route through. (Default Nav2 maps -1 to NO_INFORMATION; with allow_unknown:true the planner still works, but FREE keeps the cost surface cleaner.)
        trinary_costmap: false
        unknown_cost_value: -1

      local_mirror_layer:
        plugin: "local_mirror_layer::LocalMirrorLayer"
        enabled: True
        source_topic: /local_costmap/costmap
        # Accumulate obstacle marks globally, but accept FREE/lower-cost
        # clears only where the robot is currently looking. The local
        # rolling costmap publishes FREE cells across its whole 6x6 m
        # window; without this gate, those unobserved rear/side cells erase
        # global memory just because they are inside the rolling window.
        allow_decrease: true
        decrease_only_in_front: true
        decrease_angle_min_rad: -1.2217
        decrease_angle_max_rad: 1.2217
        decrease_range_min_m: 0.0
        decrease_range_max_m: 25.0
        track_unknown_space: true

      line_memory_mirror_layer:
        plugin: "local_mirror_layer::LocalMirrorLayer"
        enabled: True
        source_topic: /line_costmap
        # Strict accumulator mode for line memory: line cells promoted
        # from the local line-only costmap stay in global for the
        # whole run and are not cleared by later FREE cells.
        allow_decrease: false
        track_unknown_space: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 5.0 → 3.0 (post-cone-strike tune): widens the effective
        # stay-away radius from ~0.55 m to ~0.75 m around any obstacle
        # without consuming the full 1.10 m inflation_radius, so tight
        # IGVC gates still plan. Both local_costmap and global_costmap
        # share the same value by intent (see global_costmap comment).
        cost_scaling_factor: 3.0
        inflation_radius: 1.30
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: False
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 2.0
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait", "gradient_escape"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    gradient_escape:
      plugin: "gradient_escape::GradientEscape"
    global_frame: odom
    # Stay on nav_center for footprint/costmap consistency with the local
    # costmap. Spin/BackUp/DriveOnHeading still command angular velocity
    # against base_link kinematics (the diff-drive rotation center is the
    # axle), but the footprint-collision check during simulate_ahead_time
    # uses nav_center so it matches the published footprint.
    robot_base_frame: nav_center
    transform_tolerance: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    # GradientEscape parameters
    gradient_escape.escape_speed: 0.1
    gradient_escape.cost_threshold: 127.0
    gradient_escape.sample_radius: 0.15
    gradient_escape.num_samples: 16
    gradient_escape.timeout: 15.0

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    # ────────────────────────────────────────────────────────────────
    # 0.26 m/s here is the ACTUAL top speed the robot sees on /cmd_vel,
    # despite DWB allowing max_vel_x=1.5 upstream. Two distinct
    # constraints meet at this value — touching either side has cost:
    #
    # CONTROLLER-CHATTER-SENSITIVE upper bound: raising max_velocity[0]
    #   has reproducibly reintroduced longitudinal start-stop chatter
    #   because the controller overshoots whenever the goal updates,
    #   and this clamp is the only thing keeping the overshoot inside
    #   a few cm. Raise only after diagnosing the chatter chain end-
    #   to-end (goal updates → DWB sampling → smoother cap). max_accel
    #   / max_decel below are paired with this clamp.
    #
    # OSCILLATION-SENSITIVE lower bound: lowering below ~0.20 m/s
    #   starves gps_handler_node's bootstrap of the translation it
    #   needs to observe EKF heading from GPS displacement. Without
    #   translation the wheel-encoder yaw bias goes unobserved, ekf
    #   yaw drifts, slam_toolbox has to scan-match-correct map→odom
    #   against a moving target → map-catching-up snap → stall.
    # ────────────────────────────────────────────────────────────────
    # PHASE C.1 outdoor-validated at 0.50 m/s. Dropped back to 0.25 m/s
    # for in-house lab tests after outdoor validation — lab tests run
    # near people / equipment, the lower cap is purely a safety bound.
    # Bump back to 0.50 (or onward to 0.80 per PHASEC.md C.2) before
    # the next outdoor mission.
    max_velocity: [0.25, 0.0, 1.0]
    min_velocity: [-0.25, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    # /local_ekf/odom is the EKF-fused output. Only matters if feedback
    # is switched away from OPEN_LOOP (the current setting at line above
    # ignores this topic).
    odom_topic: "/local_ekf/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
