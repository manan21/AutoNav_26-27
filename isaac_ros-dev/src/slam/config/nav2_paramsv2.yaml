bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    # Use the EKF-fused odom (wheel + SICK IMU) so behavior-tree
    # conditions (IsStuck, GoalUpdated staleness checks, etc.) reason
    # about smoothed velocity/pose, not raw wheel encoder readings.
    odom_topic: /local_ekf/odom
    bt_loop_duration: 10
    default_server_timeout: 60
    wait_for_service_timeout: 1000
    default_nav_to_pose_bt_xml: "/autonav/isaac_ros-dev/install/slam/share/slam/behavior_trees/bt_nav.xml"
    default_nav_through_poses_bt_xml: "/autonav/isaac_ros-dev/install/slam/share/slam/behavior_trees/bt_nav.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node
      - autonav_goal_bender_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 2.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 8.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 6.28319
    # Regulated Pure Pursuit Controller (RPP) — picks a single lookahead
    # point on /plan and steers directly toward it. No trajectory sampling,
    # no scoring critics — the robot can't "decide" to cut a corner because
    # there is no scoring loop that could rank a shortcut above the path.
    #
    # Speed is regulated down on tight curves AND when the robot is close
    # to cost (use_*_regulated_linear_velocity_scaling), so it slows for
    # corners and near obstacles automatically.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # ── Speed envelope (matches the robot's mechanical limits) ─────
      desired_linear_vel: 0.55
      max_angular_accel: 1.2

      # ── Lookahead — smallest knob with the biggest effect ─────────
      # Smaller = tracks path tighter, turns sharper at corners.
      # Larger  = smoother, but can cut corners on tight bends.
      # Start at 0.4 m (≈0.8 s of travel at 0.5 m/s); if the robot
      # over-rotates at corners, bump toward 0.55. If shortcuts come
      # back, drop toward 0.30.
      lookahead_dist: 0.4
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.7
      lookahead_time: 1.0
      use_velocity_scaled_lookahead_dist: true

      # ── Approach to goal — slow down near the goal ────────────────
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6

      # ── Collision detection — stop if a forward arc hits cost ─────
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

      # ── Speed regulation: slow on curves AND near cost ────────────
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.5
      regulated_linear_scaling_min_speed: 0.1
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.6
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 5.0   # MUST match inflation_layer's cost_scaling_factor

      # ── Rotate-in-place at start when heading is way off path ─────
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.5
      rotate_to_heading_angular_vel: 0.7

      # ── Transform / search params ─────────────────────────────────
      transform_tolerance: 0.2
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 15.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[ [0.77, 0.41], [0.77, -0.41], [-0.32, -0.41], [-0.32, 0.41] ]"
      footprint_padding: 0.0
      plugins: ["obstacle_layer", "line_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        # Source = PCA-filtered 2-D LaserScan (autonav_detection::
        # grade_detector → pointcloud_to_laserscan in slam.launch.py).
        # The 3-D /scan_pca_filtered_points is collapsed once, upstream,
        # into /scan_pca_filtered so SLAM and this layer see the same
        # 2-D representation. Every return in this scan is an obstacle
        # (ground / ramp already filtered by PCA grade classification).
        observation_sources: filtered_scan
        filtered_scan:
          topic: /scan_pca_filtered
          observation_persistence: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          # Asymmetric ranges: mark obstacles short-range (dynamics
          # hygiene) but raytrace-clear free space all the way out to
          # the lidar's full reach. This makes the lidar's current view
          # of free space override any stale marks from earlier scans
          # or (in global's case) from the static map.
          raytrace_max_range: 25.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      line_layer:
        plugin: "line_layer::LineLayer"
        enabled: True
        line_topic: "/line_points"
        transform_tolerance: 0.2
        rolling_window: True
        publish_costmap: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.5 # Controller can use footprint so inflation radius is now margin of safety from obstacle edge to footprint edge

      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 3.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      footprint: "[ [0.77, 0.41], [0.77, -0.41], [-0.32, -0.41], [-0.32, 0.41] ]"
      footprint_padding: 0.0
      resolution: 0.10
      # When static_layer is enabled, the incoming SLAM map defines the global costmap geometry.
      # Therefore, the following width, height, and origin are not used
      width: 50
      height: 50
      origin_x: -25.0
      origin_y: -25.0
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "line_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        # /map_padded (from map_padder), NOT raw /map. map_padder's
        # bounding box expands to include the robot tile + plan + goal,
        # so the global costmap grows to follow the frontier instead of
        # being anchored to wherever SLAM has actually mapped so far.
        map_topic: "/map_padded"
        first_map_only: false

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        # Same source as the local costmap above — see notes there.
        observation_sources: filtered_scan
        filtered_scan:
          topic: /scan_pca_filtered
          observation_persistence: 0.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          # Same asymmetric ranges as local — short-range marking, long-
          # range clearing. The global static_layer (from /map_padded)
          # paints the persistent picture; this layer's long clearing
          # ensures lidar-visible free space overrides any LETHAL fill
          # map_padder placed outside its currently-active corridor.
          raytrace_max_range: 25.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      line_layer:
        plugin: "line_layer::LineLayer"
        enabled: True
        line_topic: "/line_points"
        transform_tolerance: 0.2
        rolling_window: False
        publish_costmap: False

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.90 # NavfnPlanner treats the robot as a point at base_link; inflation must therefore cover from obstacle edge to the furthest footprint corner. For the [0.77, 0.41] footprint, sqrt(0.77² + 0.41²) ≈ 0.873 m — 0.90 m gives ~3 cm safety margin. Was 0.8 m which fell short by ~7 cm and let the global planner route paths the local DWB had to reject on collision grounds. Kernel grows 17×17 → 19×19 cells.
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: False
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 2.0
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait", "gradient_escape"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    gradient_escape:
      plugin: "gradient_escape::GradientEscape"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    # GradientEscape parameters
    gradient_escape.escape_speed: 0.1
    gradient_escape.cost_threshold: 127.0
    gradient_escape.sample_radius: 0.15
    gradient_escape.num_samples: 16
    gradient_escape.timeout: 15.0

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    # /local_ekf/odom is the EKF-fused output. Only matters if feedback
    # is switched away from OPEN_LOOP (the current setting at line above
    # ignores this topic).
    odom_topic: "/local_ekf/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
