bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    # Use the EKF-fused odom (wheel + SICK IMU) so behavior-tree
    # conditions (IsStuck, GoalUpdated staleness checks, etc.) reason
    # about smoothed velocity/pose, not raw wheel encoder readings.
    odom_topic: /local_ekf/odom
    bt_loop_duration: 10
    default_server_timeout: 60
    wait_for_service_timeout: 1000
    default_nav_to_pose_bt_xml: "/autonav/isaac_ros-dev/install/slam/share/slam/behavior_trees/bt_nav.xml"
    default_nav_through_poses_bt_xml: "/autonav/isaac_ros-dev/install/slam/share/slam/behavior_trees/bt_nav.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node
      - autonav_goal_bender_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 2.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 8.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 6.28319
    # DWB Local Planner — aggressive path-lock tuning.
    # PathDist and PathAlign weights pushed 2-3x over Nav2 defaults so the
    # cost penalty for ANY deviation off /plan dominates trajectory
    # selection. ObstacleFootprint boosted to make even brushing inflated
    # cost regions expensive. PathAlign.forward_point_distance is non-zero
    # so alignment is scored from a point ~32 cm ahead of base_link — this
    # is what stops corner-cutting (with FPD=0 the alignment is from
    # base_link itself which lets shortcuts score acceptably).
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.55
      max_vel_y: 0.0
      max_vel_theta: 0.65
      min_speed_xy: 0.0
      max_speed_xy: 0.55
      min_speed_theta: 0.15
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 0.9
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -0.9
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 24
      sim_time: 1.2            # short horizon reduces turn overcommit when camera-visible line evidence drops out
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: True
      stateful: True
      # Keep path-locking high, but include a conservative obstacle critic
      # so DWB cannot cut through recently seen local line costs during turns.
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.08
      PathAlign.scale: 64.0
      # forward_point_distance: 0.29 m — the geometric midpoint along
      # the robot X-axis between the rear drive wheels (at X=0 in
      # shogi.urdf) and the front caster (at X=+0.577). DWB samples a
      # virtual point this far ahead of each trajectory's endpoint in
      # the heading direction and scores alignment against /plan there.
      # Sitting near the diff-drive pivot axis (rear-wheel axle line)
      # plus a small lookahead matches the kinematic center of rotation
      # for this rear-drive + front-caster layout, which keeps body
      # off-tracking minimal during turns.
      PathAlign.forward_point_distance: 0.29
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.29
      PathDist.scale: 96.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 15.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[ [0.77, 0.41], [0.77, -0.41], [-0.32, -0.41], [-0.32, 0.41] ]"
      footprint_padding: 0.0
      plugins: ["obstacle_layer", "line_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        # Source = PCA-filtered 2-D LaserScan (autonav_detection::
        # grade_detector → pointcloud_to_laserscan in slam.launch.py).
        # The 3-D /scan_pca_filtered_points is collapsed once, upstream,
        # into /scan_pca_filtered so SLAM and this layer see the same
        # 2-D representation. Every return in this scan is an obstacle
        # (ground / ramp already filtered by PCA grade classification).
        # Two observation sources to split marking and clearing FOVs:
        #   mark_scan  → /scan_pca_filtered       (180°, marking only)
        #   clear_scan → /scan_pca_filtered_clear (160°, clearing only)
        # The outer 10° wedge on each side marks obstacles but doesn't
        # raytrace-clear them — the lidar's beam density / accuracy
        # falls off at the FOV edges, so we don't let those edge rays
        # claim "this cell is free." Stored marks in that wedge persist
        # until the local rolling window drops them.
        observation_sources: mark_scan clear_scan

        mark_scan:
          topic: /scan_pca_filtered
          observation_persistence: 0.0
          marking: True
          clearing: False
          data_type: "LaserScan"
          inf_is_valid: false
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          # raytrace ranges unused (clearing: False), but set for safety
          raytrace_max_range: 0.0
          raytrace_min_range: 0.0

        clear_scan:
          topic: /scan_pca_filtered_clear
          observation_persistence: 0.0
          marking: False
          clearing: True
          data_type: "LaserScan"
          inf_is_valid: false
          # raytrace-clear free space all the way out to the lidar's
          # full reach. Marking ranges unused (marking: False).
          raytrace_max_range: 25.0
          raytrace_min_range: 0.0
          obstacle_max_range: 0.0
          obstacle_min_range: 0.0

      line_layer:
        plugin: "line_layer::LineLayer"
        enabled: True
        line_topic: "/line_points"
        transform_tolerance: 0.2
        max_message_age_ms: 750
        observation_persistence_ms: 10000
        observation_persistence_resolution_m: 0.10
        max_persisted_points: 12000
        clearing: True
        rolling_window: True
        publish_costmap: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 1.10

      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 3.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      footprint: "[ [0.77, 0.41], [0.77, -0.41], [-0.32, -0.41], [-0.32, 0.41] ]"
      footprint_padding: 0.0
      resolution: 0.10
      # static_layer drives the global costmap geometry from /map_padded, which is a dynamic bounding box covering robot footprint + goal + plan. The width/height/origin below are only the pre-first-/map_padded fallback.
      width: 6
      height: 6
      origin_x: -3.0
      origin_y: -3.0
      track_unknown_space: true
      # NO sensor data is fed directly into the global costmap.
      # The two contributors are:
      #   static_layer       → /map_padded → geometry only (all cells UNKNOWN; no SLAM data, no LETHAL corridor walls). map_padder still grows/shrinks the bounding box toward goals.
      #   local_mirror_layer → /local_costmap/costmap → persistent memory of local obstacles/lines.
      #   line_layer         → /line_points directly, non-clearing, so seen lane boundaries remain in global even after leaving camera view.
      # Inflation matches the local (1.10 m) so the planner respects the same clearance the controller's local view uses.
      plugins: ["static_layer", "local_mirror_layer", "line_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        map_topic: "/map_padded"
        first_map_only: false
        # Treat UNKNOWN cells in /map_padded as FREE_SPACE for the planner — Dijkstra can route through. (Default Nav2 maps -1 to NO_INFORMATION; with allow_unknown:true the planner still works, but FREE keeps the cost surface cleaner.)
        trinary_costmap: false
        unknown_cost_value: -1

      local_mirror_layer:
        plugin: "local_mirror_layer::LocalMirrorLayer"
        enabled: True
        source_topic: /local_costmap/costmap
        # Trust local's raytrace clearing: FREE cells from the local propagate
        # to the global so lidar-cleared cells stop smearing as permanent
        # walls. Edge-of-FOV persistence is already provided upstream by the
        # 180° mark / 140° clear split in slam.launch.py — those 20° wedges
        # on each side keep edge marks alive in the local rolling grid until
        # the window moves on, and the mirror inherits that persistence.
        # Long-term line memory comes from the global line_layer below
        # (direct /line_points subscription), which max-merges on top of
        # this layer in plugin order.
        allow_decrease: true
        track_unknown_space: true

      line_layer:
        plugin: "line_layer::LineLayer"
        enabled: True
        line_topic: "/line_points"
        transform_tolerance: 0.2
        max_message_age_ms: 750
        # Global line memory is indefinite: negative max means no memory cap.
        observation_persistence_ms: 0
        observation_persistence_resolution_m: 0.10
        max_persisted_points: -1
        clearing: False
        rolling_window: False
        publish_costmap: False

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 1.10
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: False
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 2.0
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait", "gradient_escape"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    gradient_escape:
      plugin: "gradient_escape::GradientEscape"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    # GradientEscape parameters
    gradient_escape.escape_speed: 0.1
    gradient_escape.cost_threshold: 127.0
    gradient_escape.sample_radius: 0.15
    gradient_escape.num_samples: 16
    gradient_escape.timeout: 15.0

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    # /local_ekf/odom is the EKF-fused output. Only matters if feedback
    # is switched away from OPEN_LOOP (the current setting at line above
    # ignores this topic).
    odom_topic: "/local_ekf/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
