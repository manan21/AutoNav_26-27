# Calibration constants for t007 (Speed) and t010 (Neutral Steering Drift)
#
# Edit these values based on your measurements.
#
# Speed conversion formula (MPH -> motor command):
#   v = Kcal * mph
#   cmd_speed = A0 * v^2 + A1 * v + A2
#   (A0 multiplies the squared term, A1 the linear term, A2 is constant)
# Guidance:
# - Start with A0=0.0, A1=1.0, A2=0.0 if you're unsure.
# - Fit A0/A1/A2 empirically to match commanded vs observed speed.
# - Use Kcal as an overall scaling knob (e.g., terrain/gear ratio effects).

speed_calibration:
  A0: 0.0
  A1: 1.0
  A2: 0.0
  Kcal: 1.0

# Neutral steering drift calibration on a flat surface:
# Constraint/Anchor:
#   L_cal + R_cal = 2.0  (keeps average speed unchanged)
# How to tune:
# - If robot drifts RIGHT (negative lateral), decrease L_cal slightly (<1.0)
#   Example: L_cal=0.99 => R_cal=1.01
# - If robot drifts LEFT (positive lateral), increase L_cal slightly (>1.0)
#   Example: L_cal=1.01 => R_cal=0.99
# - Set R_cal using the anchor: R_cal = 2.0 - L_cal
#
# Measurement reference (suggested):
# - Perform a straight 4.57 m run, measure lateral_drift (meters) at end.
# - Consider normalized drift = |lateral_drift| / forward_distance as a guide
#   to how much to nudge L_cal away from 1.0.

steering_calibration:
  L_cal: 1.0
  R_cal: 1.0
