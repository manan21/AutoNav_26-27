# ZED parameter overrides (applied on top of submodule defaults)
# This file is passed via ros_params_override_path in sensors.launch.py

/**:
    ros__parameters:
        general:
            # Accelerated camera feed (ported from fix/controller-plus-lines).
            # Submodule defaults grab HD1080 @ 15 FPS + NEURAL_LIGHT depth,
            # which on this Jetson dropped ~36% of frames and only delivered
            # ~1.3 Hz of RGB+depth -- starving the line pipeline. HD720 grab is
            # ~44% the pixels (lighter depth), grab 30 / publish 20 uncaps the
            # 15 FPS ceiling, and pub_downscale 3.0 publishes 240p so the
            # messages are small enough to flow at 20 Hz. depth capped at 6 m
            # (detector gates lines at <=5.5 m) trims per-frame depth cost.
            grab_resolution: 'HD720'      # was HD1080 (submodule default)
            grab_frame_rate: 30           # was 15 (the FPS ceiling)
            pub_resolution: 'CUSTOM'      # downscale published image/depth
            pub_downscale_factor: 3.0     # 720 / 3 = 240p published
            pub_frame_rate: 20.0          # 20 FPS coming in (target = lidar ~20 Hz)
        depth:
            max_depth: 6.0                # was 15.0; detector only uses <=5.5 m
        sensors:
            sensors_pub_rate: 380.0
