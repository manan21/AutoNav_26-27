course_id: sparse_lines
description: "auto_camera suite #4: long straights + dashed/intermittent lines -> camera line persistence + EKF-drift clearing"

datum:
  latitude_deg: 37.23027
  longitude_deg: -80.42504
  altitude_m: 650.0

start:
  x_m: 0.0
  y_m: 0.0
  yaw_rad: 0.0

finish:
  x_m: 42.0
  y_m: 0.0
  radius_m: 1.25

robot:
  base_link_to_nav_center_m: 0.225
  lidar_x_from_base_link_m: 0.6598
  lidar_z_from_base_link_m: 0.20568
  base_link_height_above_ground_m: 0.11303
  gps_x_from_base_link_m: -0.2122
  gps_y_from_base_link_m: -0.000105
  gps_z_from_base_link_m: 0.66161
  wheel_track_m: 0.72326
  wheel_radius_m: 0.12946
  physical_half_length_m: 0.545
  physical_half_width_m: 0.410
  footprint_padding_m: 0.050
  max_linear_speed_mps: 0.50
  max_angular_speed_radps: 1.0
  cmd_latency_s: 0.08
  linear_time_constant_s: 0.20
  angular_time_constant_s: 0.18

tape_width_m: 0.0762

# Long, mostly-straight 10 ft lane with very few obstacles so EKF/odom drift
# accumulates over distance. Boundaries are dashed/intermittent and there are
# internal dashed lane markers -- the camera must persist remembered line cells
# while looking away and then ray-trace-clear stale (drifted) line memory when
# it re-confirms free space ahead. This is the primary C-ii (camera-confirmed
# global line clearing) validation course.
centerline:
  - {x_m: 0.0,  y_m: 0.00, width_m: 3.048}
  - {x_m: 10.0, y_m: 0.00, width_m: 3.048}
  - {x_m: 20.0, y_m: 0.30, width_m: 3.048}
  - {x_m: 30.0, y_m: 0.00, width_m: 3.048}
  - {x_m: 42.0, y_m: 0.00, width_m: 3.048}

internal_lines:
  - name: internal_no_cross_far
    start: {x_m: 36.0, y_m: 1.40}
    end: {x_m: 36.0, y_m: 0.30}
    width_m: 0.0762

dashed_lines:
  - name: dashed_left_long
    start: {x_m: 4.0, y_m: 1.524}
    end: {x_m: 38.0, y_m: 1.524}
    width_m: 0.0762
    dash_length_m: 0.90
    gap_length_m: 0.90
  - name: dashed_right_long
    start: {x_m: 4.0, y_m: -1.524}
    end: {x_m: 38.0, y_m: -1.524}
    width_m: 0.0762
    dash_length_m: 0.90
    gap_length_m: 0.90

obstacles:
  - {name: lone_barrel, type: barrel, x_m: 24.0, y_m: 0.80, radius_m: 0.28, height_m: 0.85}

potholes: []

ramps: []

speed_check:
  start_x_m: 0.0
  end_distance_m: 13.4112
  minimum_average_mps: 0.44704
  maximum_speed_mps: 2.2352
  blocking_stop_s: 60.0

mission_waypoints:
  - {label: straight_1, type: local, x_m: 9.0,  y_m: 0.0, radius_m: 0.75}
  - {label: straight_2, type: gps,   x_m: 20.0, y_m: 0.2, radius_m: 1.0}
  - {label: past_barrel, type: gps,  x_m: 30.0, y_m: 0.0, radius_m: 1.0}
  - {label: finish_gps, type: gps,   x_m: 42.0, y_m: 0.0, radius_m: 1.25}

analysis_stations:
  - {label: long_straight_a, x_m: 14.0, y_min_m: -1.5, y_max_m: 1.5}
  - {label: long_straight_b, x_m: 30.0, y_min_m: -1.5, y_max_m: 1.5}
