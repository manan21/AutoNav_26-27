course_id: ramp_turns
description: "auto_camera suite #5: grade + potholes near lines + sharp curvature -> recovery, turning radius vs footprint"

datum:
  latitude_deg: 37.23027
  longitude_deg: -80.42504
  altitude_m: 650.0

start:
  x_m: 0.0
  y_m: 0.0
  yaw_rad: 0.0

finish:
  x_m: 34.0
  y_m: 1.50
  radius_m: 1.25

robot:
  base_link_to_nav_center_m: 0.225
  lidar_x_from_base_link_m: 0.6598
  lidar_z_from_base_link_m: 0.20568
  base_link_height_above_ground_m: 0.11303
  gps_x_from_base_link_m: -0.2122
  gps_y_from_base_link_m: -0.000105
  gps_z_from_base_link_m: 0.66161
  wheel_track_m: 0.72326
  wheel_radius_m: 0.12946
  physical_half_length_m: 0.545
  physical_half_width_m: 0.410
  footprint_padding_m: 0.050
  max_linear_speed_mps: 0.50
  max_angular_speed_radps: 1.0
  cmd_latency_s: 0.08
  linear_time_constant_s: 0.20
  angular_time_constant_s: 0.18

tape_width_m: 0.0762

# Serpentine 10 ft lane with large lateral swings (sharp turns relative to the
# 0.5 m turning radius / rectangular footprint), a legal ramp, and potholes
# placed near the boundary tape. Stresses turning-radius-vs-footprint planning
# and recovery without the robot wedging itself or wiggling in place.
centerline:
  - {x_m: 0.0,  y_m: 0.00,  width_m: 3.048}
  - {x_m: 5.0,  y_m: 1.60,  width_m: 3.048}
  - {x_m: 10.0, y_m: -1.60, width_m: 3.048}
  - {x_m: 15.0, y_m: 1.60,  width_m: 3.048}
  - {x_m: 20.0, y_m: -1.20, width_m: 3.048}
  - {x_m: 25.0, y_m: 0.40,  width_m: 3.6576}
  - {x_m: 30.0, y_m: 1.20,  width_m: 3.048}
  - {x_m: 34.0, y_m: 1.50,  width_m: 3.048}

obstacles:
  - {name: turn_apex_barrel, type: barrel, x_m: 12.5, y_m: 0.10, radius_m: 0.28, height_m: 0.85}
  - {name: exit_post, type: post, x_m: 31.5, y_m: 0.10, radius_m: 0.18, height_m: 1.10}

potholes:
  - {name: pothole_near_left,  x_m: 7.5,  y_m: 1.05, radius_m: 0.3048}
  - {name: pothole_near_right, x_m: 17.5, y_m: 1.05, radius_m: 0.3048}

ramps:
  - name: legal_grade_ramp
    start_x_m: 23.0
    end_x_m: 27.0
    center_y_m: 0.40
    width_m: 1.80
    rise_m: 0.40

speed_check:
  start_x_m: 0.0
  end_distance_m: 13.4112
  minimum_average_mps: 0.44704
  maximum_speed_mps: 2.2352
  blocking_stop_s: 60.0

mission_waypoints:
  - {label: first_swing, type: local, x_m: 5.0,  y_m: 1.40, radius_m: 0.85}
  - {label: mid_swing,   type: gps,   x_m: 15.0, y_m: 1.40, radius_m: 1.0}
  - {label: ramp_goal,   type: gps,   x_m: 25.0, y_m: 0.40, radius_m: 1.0}
  - {label: finish_gps,  type: gps,   x_m: 34.0, y_m: 1.50, radius_m: 1.25}

analysis_stations:
  - {label: swing_1, x_m: 5.0,  y_min_m: 0.0, y_max_m: 2.5}
  - {label: swing_2, x_m: 10.0, y_min_m: -2.5, y_max_m: 0.0}
  - {label: ramp,    x_m: 25.0, y_min_m: -0.6, y_max_m: 1.4}
