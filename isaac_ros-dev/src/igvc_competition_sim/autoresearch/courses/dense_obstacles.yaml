course_id: dense_obstacles
description: "auto_camera suite #3: slalom of barrels/posts -> obstacle avoidance + smoothness"

datum:
  latitude_deg: 37.23027
  longitude_deg: -80.42504
  altitude_m: 650.0

start:
  x_m: 0.0
  y_m: 0.0
  yaw_rad: 0.0

finish:
  x_m: 36.0
  y_m: 0.0
  radius_m: 1.25

robot:
  base_link_to_nav_center_m: 0.225
  lidar_x_from_base_link_m: 0.6598
  lidar_z_from_base_link_m: 0.20568
  base_link_height_above_ground_m: 0.11303
  gps_x_from_base_link_m: -0.2122
  gps_y_from_base_link_m: -0.000105
  gps_z_from_base_link_m: 0.66161
  wheel_track_m: 0.72326
  wheel_radius_m: 0.12946
  physical_half_length_m: 0.545
  physical_half_width_m: 0.410
  footprint_padding_m: 0.050
  max_linear_speed_mps: 0.50
  max_angular_speed_radps: 1.0
  cmd_latency_s: 0.08
  linear_time_constant_s: 0.20
  angular_time_constant_s: 0.18

tape_width_m: 0.0762

# Open 16 ft lane, straight, packed with alternating obstacles so the robot
# must serpentine. Obstacles protrude past the lane center (edge ~+/-0.62 m)
# forcing it to the opposite side at each station -> exercises smooth weaving
# without the controller stalling or oscillating.
centerline:
  - {x_m: 0.0,  y_m: 0.0, width_m: 4.8768}
  - {x_m: 9.0,  y_m: 0.0, width_m: 4.8768}
  - {x_m: 18.0, y_m: 0.0, width_m: 4.8768}
  - {x_m: 27.0, y_m: 0.0, width_m: 4.8768}
  - {x_m: 36.0, y_m: 0.0, width_m: 4.8768}

obstacles:
  - {name: slalom_0, type: barrel, x_m: 4.0,  y_m: 0.90,  radius_m: 0.28, height_m: 0.85}
  - {name: slalom_1, type: barrel, x_m: 8.0,  y_m: -0.90, radius_m: 0.28, height_m: 0.85}
  - {name: slalom_2, type: barrel, x_m: 12.0, y_m: 0.90,  radius_m: 0.28, height_m: 0.85}
  - {name: slalom_3, type: post,   x_m: 16.0, y_m: -0.90, radius_m: 0.18, height_m: 1.10}
  - {name: slalom_4, type: barrel, x_m: 20.0, y_m: 0.90,  radius_m: 0.28, height_m: 0.85}
  - {name: slalom_5, type: barrel, x_m: 24.0, y_m: -0.90, radius_m: 0.28, height_m: 0.85}
  - {name: slalom_6, type: post,   x_m: 28.0, y_m: 0.90,  radius_m: 0.18, height_m: 1.10}
  - {name: slalom_7, type: barrel, x_m: 32.0, y_m: -0.90, radius_m: 0.28, height_m: 0.85}

potholes:
  - {name: pothole_mid, x_m: 18.0, y_m: 1.30, radius_m: 0.3048}

ramps: []

speed_check:
  start_x_m: 0.0
  end_distance_m: 13.4112
  minimum_average_mps: 0.44704
  maximum_speed_mps: 2.2352
  blocking_stop_s: 60.0

mission_waypoints:
  - {label: slalom_entry, type: local, x_m: 6.0,  y_m: 0.0, radius_m: 0.75}
  - {label: slalom_mid,   type: gps,   x_m: 18.0, y_m: 0.0, radius_m: 1.0}
  - {label: slalom_exit,  type: gps,   x_m: 30.0, y_m: 0.0, radius_m: 1.0}
  - {label: finish_gps,   type: gps,   x_m: 36.0, y_m: 0.0, radius_m: 1.25}

analysis_stations:
  - {label: slalom_a, x_m: 8.0,  y_min_m: -2.0, y_max_m: 2.0}
  - {label: slalom_b, x_m: 20.0, y_min_m: -2.0, y_max_m: 2.0}
  - {label: slalom_c, x_m: 32.0, y_min_m: -2.0, y_max_m: 2.0}
