course_id: tight_gaps
description: "auto_camera suite #2: multiple ~5ft minimum legal passages -> planner/footprint clearance"

# Local map frame convention: +x forward from start, +y left, meters.
datum:
  latitude_deg: 37.23027
  longitude_deg: -80.42504
  altitude_m: 650.0

start:
  x_m: 0.0
  y_m: 0.0
  yaw_rad: 0.0

finish:
  x_m: 34.0
  y_m: 0.0
  radius_m: 1.25

robot:
  base_link_to_nav_center_m: 0.225
  lidar_x_from_base_link_m: 0.6598
  lidar_z_from_base_link_m: 0.20568
  base_link_height_above_ground_m: 0.11303
  gps_x_from_base_link_m: -0.2122
  gps_y_from_base_link_m: -0.000105
  gps_z_from_base_link_m: 0.66161
  wheel_track_m: 0.72326
  wheel_radius_m: 0.12946
  physical_half_length_m: 0.545
  physical_half_width_m: 0.410
  footprint_padding_m: 0.050
  max_linear_speed_mps: 0.50
  max_angular_speed_radps: 1.0
  cmd_latency_s: 0.08
  linear_time_constant_s: 0.20
  angular_time_constant_s: 0.18

tape_width_m: 0.0762

# Wide (12 ft) lane so paired barrels can form clean ~1.6 m gaps that stay
# inside the boundary tape. Gaps are offset side to side so the robot must
# shift laterally and thread each one (padded footprint width = 0.92 m, leaving
# ~0.34 m per side -- tight but above the IGVC 5 ft minimum of 1.524 m).
centerline:
  - {x_m: 0.0,  y_m: 0.00, width_m: 3.6576}
  - {x_m: 6.0,  y_m: 0.00, width_m: 3.6576}
  - {x_m: 12.0, y_m: 0.10, width_m: 3.6576}
  - {x_m: 18.0, y_m: 0.00, width_m: 3.6576}
  - {x_m: 24.0, y_m: -0.10, width_m: 3.6576}
  - {x_m: 30.0, y_m: 0.00, width_m: 3.6576}
  - {x_m: 34.0, y_m: 0.00, width_m: 3.6576}

obstacles:
  # Gap 1 @ x=8, centered y=0  (inner edges +/-0.80 -> 1.60 m gap)
  - {name: gap1_left, type: barrel, x_m: 8.0, y_m: 1.08, radius_m: 0.28, height_m: 0.85}
  - {name: gap1_right, type: barrel, x_m: 8.0, y_m: -1.08, radius_m: 0.28, height_m: 0.85}
  # Gap 2 @ x=16, centered y=+0.40
  - {name: gap2_left, type: barrel, x_m: 16.0, y_m: 1.48, radius_m: 0.28, height_m: 0.85}
  - {name: gap2_right, type: barrel, x_m: 16.0, y_m: -0.68, radius_m: 0.28, height_m: 0.85}
  # Gap 3 @ x=24, centered y=-0.40
  - {name: gap3_left, type: barrel, x_m: 24.0, y_m: 0.68, radius_m: 0.28, height_m: 0.85}
  - {name: gap3_right, type: barrel, x_m: 24.0, y_m: -1.48, radius_m: 0.28, height_m: 0.85}
  # Final centered post pinch @ x=30
  - {name: gap4_left, type: post, x_m: 30.0, y_m: 0.98, radius_m: 0.18, height_m: 1.10}
  - {name: gap4_right, type: post, x_m: 30.0, y_m: -0.98, radius_m: 0.18, height_m: 1.10}

potholes: []

ramps: []

speed_check:
  start_x_m: 0.0
  end_distance_m: 13.4112
  minimum_average_mps: 0.44704
  maximum_speed_mps: 2.2352
  blocking_stop_s: 60.0

mission_waypoints:
  - {label: approach_gap1, type: local, x_m: 5.5, y_m: 0.0, radius_m: 0.75}
  - {label: through_gap2, type: gps, x_m: 19.0, y_m: 0.30, radius_m: 1.0}
  - {label: through_gap3, type: gps, x_m: 27.0, y_m: -0.30, radius_m: 1.0}
  - {label: finish_gps, type: gps, x_m: 34.0, y_m: 0.0, radius_m: 1.25}

analysis_stations:
  - {label: gap1, x_m: 8.0, y_min_m: -1.0, y_max_m: 1.0}
  - {label: gap2, x_m: 16.0, y_min_m: -0.6, y_max_m: 1.4}
  - {label: gap3, x_m: 24.0, y_min_m: -1.4, y_max_m: 0.6}
  - {label: gap4, x_m: 30.0, y_min_m: -0.9, y_max_m: 0.9}
