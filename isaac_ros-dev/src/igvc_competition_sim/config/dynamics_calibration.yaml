schema_version: 1
description: "Real-robot low-speed dynamics calibration inputs for the IGVC Gazebo sim."

source_runs:
  bag_root: "/Users/cole/autonav_bags/jetson_practice_course_20260529_211047"
  video_root: "/Users/cole/Downloads"
  runs:
    straight_distance_drift_low_2:
      profile: straight_distance_drift_low
      bag_dir: "straight_distance_drift_low_2"
      video_file: "straight_distance_drift_low_2.MOV"
      use_for_default_tuning:
        - linear_speed_response
        - command_latency
        - acceleration_response
        - stop_response
        - odom_forward_sanity
      excluded_from_default_tuning:
        - lateral_drift
        - flat_ground_yaw_bias
      exclusion_reason: "Parking lot cross-slope likely contaminated the right-drift measurement."
      physical_measurement:
        forward_distance_m: 9.3726
        right_drift_m: 1.5288
        lateral_drift_slope_contaminated: true
    arc_ladder_1:
      profile: arc_ladder
      bag_dir: "arc_ladder_1"
      video_file: "arc_ladder_1.MOV"
      data_quality_notes:
        - "Use decoded odom summaries for review before changing default angular gains; some odom streams are sparse or inconsistent across later segments."
      use_for_default_tuning:
        - angular_speed_response_under_translation
        - effective_turn_radius
        - left_right_turn_asymmetry
        - stop_response
    in_place_yaw_ladder_1:
      profile: in_place_yaw_ladder
      bag_dir: "in_place_yaw_ladder_1"
      video_file: "in_place_yaw_ladder_1.MOV"
      data_quality_notes:
        - "Offline report 2026-05-30: /cmd_vel commanded up to 1.0 rad/s, but /odom yaw changed 0.0 deg and /local_ekf/odom yaw changed only 0.022 deg."
        - "Treat as an odom/encoder/TF data-quality investigation source, not a yaw dynamics calibration source, until explained."
      use_for_default_tuning: []
      excluded_from_default_tuning:
        - angular_speed_response
        - angular_command_latency
        - yaw_stop_settling
        - left_right_yaw_asymmetry
      exclusion_reason: "Yaw command was present, but odom yaw did not integrate."

competition_constraints:
  tape_width_m: 0.0762
  course_width_min_m: 3.048
  course_width_max_m: 6.096
  minimum_average_speed_mps: 0.44704
  maximum_speed_mps: 2.2352
  maximum_ramp_grade: 0.15

dynamics_model:
  input_topic: "/cmd_vel"
  output_topic: "/cmd_vel_gazebo"
  state_topic: "/igvc_sim/dynamics_state"
  calibration_topic: "/igvc_sim/dynamics_calibration"
  enabled: true
  update_rate_hz: 50.0
  command_timeout_s: 0.40
  command_latency_s: 0.08
  max_linear_speed_mps: 0.50
  max_angular_speed_radps: 1.00
  linear_gain: 1.00
  angular_gain: 1.00
  positive_angular_gain: 1.00
  negative_angular_gain: 1.00
  linear_time_constant_s: 0.20
  angular_time_constant_s: 0.18
  max_linear_acceleration_mps2: 1.00
  max_angular_acceleration_radps2: 2.00
  linear_deadband_mps: 0.0
  angular_deadband_radps: 0.0
  flat_ground_yaw_bias_radps: 0.0
  notes:
    - "Do not set flat_ground_yaw_bias_radps from straight_distance_drift_low_2 lateral drift."
    - "Retune gains from arc_ladder_1 and in_place_yaw_ladder_1 before using asymmetry for final competition validation."

odometry_model:
  publish_ground_truth_odom: true
  ground_truth_topic: "/igvc_sim/ground_truth_odom"
  apply_default_odom_scale: false
  observed_straight_forward_odom_m: 7.9542
  observed_straight_local_ekf_forward_m: 8.2193
  observed_straight_physical_forward_m: 9.3726
  observed_physical_to_odom_ratio: 1.1783
  observed_physical_to_local_ekf_ratio: 1.1403
  notes:
    - "The straight run suggests odom under-reported forward travel, but this is recorded as a diagnostic until repeated on level ground."
