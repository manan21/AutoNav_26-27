course_id: igvc_competition_compact
description: "Compact IGVC AutoNav course for end-to-end Humble/Fortress regression"

# Local map frame convention: +x forward from start, +y left, meters.
datum:
  latitude_deg: 37.23027
  longitude_deg: -80.42504
  altitude_m: 650.0

start:
  x_m: 0.0
  y_m: 0.0
  yaw_rad: 0.0

finish:
  x_m: 38.0
  y_m: -0.10
  radius_m: 1.25

robot:
  base_link_to_nav_center_m: 0.225
  lidar_x_from_base_link_m: 0.6598
  lidar_z_from_base_link_m: 0.20568
  base_link_height_above_ground_m: 0.11303
  gps_x_from_base_link_m: -0.2122
  gps_y_from_base_link_m: -0.000105
  gps_z_from_base_link_m: 0.66161
  wheel_track_m: 0.72326
  wheel_radius_m: 0.12946
  physical_half_length_m: 0.545
  physical_half_width_m: 0.410
  footprint_padding_m: 0.050
  max_linear_speed_mps: 0.25
  max_angular_speed_radps: 1.0
  cmd_latency_s: 0.08
  linear_time_constant_s: 0.20
  angular_time_constant_s: 0.18

tape_width_m: 0.12

# The lane alternates between nominal 10 ft and open 20 ft sections. Boundary
# tape is generated from these stations.
centerline:
  - {x_m: 0.0,  y_m: 0.00, width_m: 3.048}
  - {x_m: 5.0,  y_m: 0.15, width_m: 3.048}
  - {x_m: 10.0, y_m: 0.65, width_m: 4.572}
  - {x_m: 15.0, y_m: 0.15, width_m: 6.096}
  - {x_m: 20.0, y_m: -1.10, width_m: 3.048}
  - {x_m: 25.0, y_m: -0.55, width_m: 3.048}
  - {x_m: 30.0, y_m: 0.60, width_m: 6.096}
  - {x_m: 34.0, y_m: 0.35, width_m: 4.572}
  - {x_m: 38.0, y_m: -0.10, width_m: 3.048}

internal_lines:
  - name: internal_no_cross
    start: {x_m: 17.0, y_m: 1.60}
    end: {x_m: 17.0, y_m: -0.20}
    width_m: 0.12

dashed_lines:
  - name: dashed_right_boundary_stress
    start: {x_m: 25.5, y_m: -2.10}
    end: {x_m: 31.0, y_m: -2.43}
    width_m: 0.12
    dash_length_m: 0.75
    gap_length_m: 0.45

obstacles:
  - {name: left_edge_barrel, type: barrel, x_m: 7.2, y_m: 1.18, radius_m: 0.28, height_m: 0.85}
  - {name: center_barrel_20ft, type: barrel, x_m: 14.6, y_m: 0.22, radius_m: 0.28, height_m: 0.85}
  - {name: decoy_gap_barrel, type: barrel, x_m: 18.8, y_m: -0.95, radius_m: 0.28, height_m: 0.85}
  - {name: post_obstacle, type: post, x_m: 32.0, y_m: 1.70, radius_m: 0.18, height_m: 1.10}

potholes:
  - {name: white_circle_pothole_0, x_m: 11.0, y_m: -0.15, radius_m: 0.3048}
  - {name: white_circle_pothole_1, x_m: 27.8, y_m: -0.10, radius_m: 0.3048}

ramps:
  - name: legal_approach_ramp
    start_x_m: 23.0
    end_x_m: 27.0
    center_y_m: -0.55
    width_m: 1.80
    rise_m: 0.40

speed_check:
  start_x_m: 0.0
  end_distance_m: 13.4112
  minimum_average_mps: 0.44704
  maximum_speed_mps: 2.2352
  blocking_stop_s: 60.0

mission_waypoints:
  - {label: bootstrap_local, type: local, x_m: 6.0, y_m: 0.25, radius_m: 0.75}
  - {label: obstacle_gps, type: gps, x_m: 15.8, y_m: -0.75, radius_m: 1.0}
  # Keep the ramp goal on the drivable lower half of the ramp lane. The
  # previous centerline target put the padded robot footprint over the
  # nearby white pothole marker, so the line/pothole memory correctly made
  # the requested goal unreachable.
  - {label: ramp_gps, type: gps, x_m: 27.2, y_m: -1.00, radius_m: 1.0}
  - {label: finish_gps, type: gps, x_m: 38.0, y_m: -0.10, radius_m: 1.25}

analysis_stations:
  - {label: right_side_route, x_m: 7.2, y_min_m: -1.25, y_max_m: 0.35}
  - {label: center_obstacle_either_side, x_m: 14.6, y_min_m: -2.35, y_max_m: 2.35}
  - {label: internal_line_right_end, x_m: 17.0, y_min_m: -1.80, y_max_m: -0.45}
  - {label: ramp_center, x_m: 25.0, y_min_m: -1.25, y_max_m: 0.20}
