# line_detector parameters.
#
# Two groups of knobs live here:
#   1. I/O & timing — camera topic, depth topic, target frame, publish/hold
#      cadence. Previously lived as -p flags in run-lines.sh.
#   2. CERIAS line-pixel detector tunables — half_window_size, sigma_threshold,
#      mew_threshold (CUDA kernel knobs) and brightness_threshold (host-side
#      pre-mask). Previously hardcoded as #defines in cuda.cu and a magic
#      `220` literal in detection.cpp; now plumbed through node.cpp.
#
# The detector marks a pixel as a line iff its neighborhood (a
# (2*half_window_size + 1) ^ 2 window) is bright on average AND has low
# variance — i.e. it sits on a smooth, evenly lit white surface.

## NOTE: The launch file names this node `line_detection_node` (see
## detection.launch.py — kept for historical compatibility with /line_points
## consumers). Using the `/**:` wildcard so this YAML applies regardless of
## node name; previously this file was keyed under `lines:` and silently
## loaded *nothing* — the running detector was on cpp defaults the whole
## time. Confirmed via `ros2 param get /line_detection_node ...` showing
## values matching node.cpp defaults rather than this file.
/**:
  ros__parameters:
    # ── I/O & timing ─────────────────────────────────────────────────────
    camera_topic: "/zed/zed_node/rgb/color/rect/image"
    depth_camera_topic: "/zed/zed_node/depth/depth_registered"
    camera_info_topic: "/zed/zed_node/rgb/color/rect/camera_info"
    line_points_topic: "/line_points"
    target_frame: "odom"
    enable_timer: true
    publish_interval_ms: 100          # 10 Hz fixed — fresh CUDA detection caps at ~10-12 Hz on this Jetson, so 10 Hz keeps every tick honest (no skipped timer events) for reliability. The cached-confirmed-voxel republish (republishConfirmedCache, see node.cpp) runs on every failure path so the local costmap sees a steady stream regardless of RGB/depth desync, matching the lidar PCA node's cached-cloud pattern.
    max_rgb_depth_delta_ms: 500       # RGB/depth sync window — widened from 120 ms; live diagnostics showed every frame rejected as "RGB/depth desynchronization" at the tighter gate.
    rgb_depth_sync_buffer_size: 12     # Keep recent RGB/depth frames and select the newest valid pair in node.cpp so timer callbacks cannot combine fresh RGB with stale depth.
    rgb_depth_require_tf_ready: true   # Prefer the newest synchronized RGB/depth pair whose stamped odom→base_link TF is already in this detector's buffer; avoids future-extrapolation gaps in distributed sim.
    tf_lookup_timeout_ms: 100
    tf_wait_for_stamp_ms: 300         # Distributed sim can put RGB-D frames ~100-200 ms ahead of TF. Wait longer for stamped TF instead of using scatter-prone latest TF.
    line_hold_timeout_ms: 2000        # Bridge brief RGB/depth/TF gaps without letting stale ghosts masquerade as fresh lines.
    motion_cache_hold_ms: 2500        # Latest-TF emergency motion cache only; stamped-TF updates are not yaw-gated.
    line_memory_max_points: 12000     # cap confirmed output points
    odom_topic: "/local_ekf/odom"

    # ── Geometry / stability gates ───────────────────────────────────────
    roi_min_y_fraction: 0.35
    max_depth_m: 6.0
    base_min_x_m: -0.25
    base_max_x_m: 5.0
    base_max_abs_y_m: 3.0
    ground_z_m: -0.11
    ground_z_tolerance_m: 0.35
    depth_fill_radius_px: 5           # Fill ZED depth holes on bright painted lines using only a consistent local depth neighborhood.
    depth_fill_min_neighbors: 2
    depth_fill_max_spread_m: 0.60
    projection_max_points: 8000       # GPU projection can afford denser sampling; improves stability when depth is sparse on the painted line.
    # Cluster shape filter now uses PCA-aligned extents (see node.cpp
    # filterLineClusters); previously it used cv::minAreaRect which
    # axis-aligned to the depth-ray direction at low point counts and
    # spuriously labeled the depth-noise smear as "width," failing the
    # max_width gate for clean lines. With PCA the major axis tracks
    # the painted line direction and minor_axis is the TRUE cross-line
    # spread, so realistic painted-line values work:
    #   • a 4-inch (10 cm) line at 4 m + ZED depth noise → ~30-50 cm
    #     cross-line spread → 0.6 m max_width is comfortable.
    #   • visible on-frame length ≥ 0.40 m for a real painted line.
    #   • aspect ≥ 3 keeps ground glints (square blobs aspect ~1) out.
    cluster_min_points: 15
    cluster_min_length_m: 0.40
    cluster_max_width_m: 0.60
    # 3D aspect gate. 3.0 rejected T/L junctions. 2.0 admitted T/L but
    # would still fail tight curves (u-turns radius < 1 m have arc-vs-
    # chord ratio near 1.5). 1.5 admits gentle curves AND T/L corners
    # while staying above the ~1.0 aspect of round bright ground blobs.
    cluster_min_aspect_ratio: 1.5
    # 0.30 m fragments the line at 4 m range where depth noise scatters
    # adjacent pixel projections by 20-30 cm; 0.50 m forms one cluster.
    cluster_link_distance_m: 0.50
    temporal_voxel_size_m: 0.10
    # Require two different synchronized RGB-D frames before confirming a
    # voxel. getSynchronizedImages consumes selected frames, so this cannot
    # be satisfied by reprocessing one stale frame.
    temporal_min_hits: 2
    temporal_confirm_window_ms: 750
    # Covers the camera's near-ground blind spot while keeping one-frame
    # ghosts from blocking the planner for most of a recovery cycle.
    confirmed_hold_ms: 2500
    yaw_rate_gate_rad_s: 0.6
    debug_image_publish_enabled: true
    debug_image_write_enabled: false
    # Default to stamped TF at the depth-image timestamp. Latest-TF
    # projection is kept as an emergency field fallback only; it can smear
    # lines into arcs during turns because the image/depth frame was
    # captured at an older robot pose.
    tf_use_latest: false

    # ── CERIAS line-pixel detector ───────────────────────────────────────
    # Stage 1: host-side binary mask. Pixels brighter than this are
    # candidates for the kernel; everything else is dropped before GPU
    # work. Range 0-255. ↑ keeps only the whitest pixels (misses dirty
    # lines); ↓ admits more candidates (more GPU work, more false alarms).
    brightness_threshold: 220.0

    # Stage 2: GPU CERIAS kernel. Half-width of the local statistics
    # window — full window = (2*N + 1)^2 = 7x7 by default. ↑ smooths over
    # more area (better noise rejection, but loses thin or short line
    # segments); ↓ tightens the local stat (catches finer structure but
    # admits more single-pixel noise).
    half_window_size: 3

    # Local stddev cap. A pixel passes only if its window stddev is BELOW
    # this. Lines on smooth painted surfaces have low variance; rough
    # textured terrain (mulch, gravel) has high variance and gets
    # rejected. ↑ admits more textured surfaces as "line"; ↓ stricter,
    # rejects edges of dirty lines.
    sigma_threshold: 5.0

    # Local mean floor. A pixel passes only if its window mean is ABOVE
    # this. Caps darker grays/asphalt from masquerading as lines after
    # the brightness pre-mask survives them. ↑ requires brighter
    # neighborhoods (cleaner lines only); ↓ admits dimmer near-line
    # surfaces. Range 0-255.
    mew_threshold: 200.0

    # ── Semantic color candidates ─────────────────────────────────────────
    # The CUDA CERIAS pass is still useful for clean white paint, but IGVC
    # field lighting, dirty paint, and yellow lane markings need color-aware
    # candidates before depth/ground/cluster validation.
    color_mask_enabled: true
    detect_white_lines: true
    detect_yellow_lines: true
    white_value_min: 165
    white_saturation_max: 110
    yellow_hue_min: 12
    yellow_hue_max: 45
    yellow_saturation_min: 50
    yellow_value_min: 90
    semantic_mask_close_px: 5
    semantic_mask_open_px: 0
    semantic_mask_min_component_px: 20
