# Disable text-mode VT switching.
# Drop in to: /etc/systemd/logind.conf.d/10-kiosk.conf  (root-owned).
#
# NAutoVTs=0 stops logind from spawning getty@tty2..tty6.
# ReserveVT=0 frees the reserved VT (default 6) so nothing listens.
#
# After applying this and rebooting, Ctrl+Alt+F2..F6 should switch to
# nothing and `chvt 2` should fail. tty1 still hosts the active X
# session (lightdm + Openbox + GUI). SSH remains the only recovery
# path: confirm SSH access from a second machine before applying
# this layer (see ../README.md and ../GUI_SAFETY_PLAN.md section 6).

[Login]
NAutoVTs=0
ReserveVT=0
