# LightDM autologin for the kiosk user.
# Drop in to: /etc/lightdm/lightdm.conf.d/50-autologin.conf
#
# The session name "openbox" matches the session file installed by
# the openbox-session package: /usr/share/xsessions/openbox.desktop.
# If the Jetson uses GDM3 or SDDM instead of LightDM the equivalent
# file lives elsewhere (see scan.sh output); this template is for
# the LightDM case.

[Seat:*]
autologin-user=autonav-kiosk
autologin-user-timeout=0
autologin-session=openbox
allow-guest=false
greeter-hide-users=true
greeter-allow-guest=false
