# Disable Ctrl+Alt+Backspace (the X server "zap" shortcut).
# Drop in to: /etc/X11/xorg.conf.d/99-no-zap.conf  (root-owned).
#
# Without this, anyone with keyboard access can instantly kill the X
# server, dumping out to whatever the display manager does on session
# end. On a kiosk that is exactly what we are trying to prevent.

Section "ServerFlags"
    Option "DontZap" "true"
EndSection
